project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - publications.qmd
    - softwares.qmd
    - talks.qmd
    - teaching.qmd
    - cv.qmd
    - 404.qmd
    - zh/index.qmd
    - zh/publications.qmd
    - zh/softwares.qmd
    - zh/talks.qmd
    - zh/teaching.qmd
    - zh/cv.qmd
    - zh/404.qmd
  resources:
    - files/
    - images/
    - language-switch.js
    - .nojekyll

website:
  title: "Zhijian Lai"
  site-url: "https://galvinlai.github.io"
  description: "Personal academic website of Zhijian Lai"
  favicon: images/myphoto.png
  navbar:
    pinned: true
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Publications"
        href: publications.qmd
      - text: "Software"
        href: softwares.qmd
      - text: "Talks"
        href: talks.qmd
      - text: "Teaching"
        href: teaching.qmd
      - text: "CV"
        href: cv.qmd
  page-footer:
    left: "© Zhijian Lai"
    right: "Built with [Quarto](https://quarto.org/)"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-location: right
    page-layout: article
    smooth-scroll: true
    anchor-sections: true
    link-external-newwindow: true
    html-math-method: katex
    include-in-header:
      text: |
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
    include-after-body:
      text: |
        <script src="/language-switch.js"></script>

execute:
  freeze: auto
